name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          ssh ${SSH_OPTS} "${VPS_USER}@${VPS_HOST}" "mkdir -p /root/zaidan-portfolio"

          rsync -avz \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.astro' \
            --exclude '.env' \
            -e "ssh ${SSH_OPTS}" \
            ./ "${VPS_USER}@${VPS_HOST}:/root/zaidan-portfolio/"

      - name: Build and start containers
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p /root/zaidan-portfolio
            cd /root/zaidan-portfolio

            if [ ! -f .env ]; then
              if [ -f .env.example ]; then
                cp .env.example .env
                echo "::warning::Created .env from .env.example. SSH in and set real secrets before production use."
              else
                echo "::error::Missing .env and .env.example on the VPS." >&2
                exit 1
              fi
            fi

            docker compose up -d --build
