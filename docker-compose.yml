services:
  portfolio:
    build:
      context: .
      args:
        SITE_URL: ${SITE_URL:-https://arxiron.com/}
    image: astro-bento-portfolio
    ports:
      - "4321:4321"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${DB_USER:-portfolio}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-portfolio_db}
      - DIRECTUS_INTERNAL_URL=http://directus:8055
    depends_on:
      db:
        condition: service_healthy
      directus:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-portfolio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portfolio} -d ${DB_NAME:-portfolio_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_NAME:-portfolio_db}
      DB_USER: ${DB_USER:-portfolio}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      SECRET: ${DIRECTUS_SECRET:-change-this-to-a-random-secret}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-zaidan@arxiron.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin123}
      PUBLIC_URL: ${DIRECTUS_URL:-https://admin.arxiron.com}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
    volumes:
      - directus_uploads:/directus/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  directus_uploads:
