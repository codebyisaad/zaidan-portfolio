services:
  portfolio:
    build: .
    image: astro-bento-portfolio
    ports:
      - "4321:4321"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${DB_USER:-portfolio}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-portfolio_db}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-portfolio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portfolio} -d ${DB_NAME:-portfolio_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
